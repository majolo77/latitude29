<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latitude 29 — Escola de Voo Livre</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --azul-ceu: #1D3557;
      --azul-claro: #457B9D;
      --gelo: #A8DADC;
      --areia: #F1FAEE;
      --laranja: #E76F51;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--areia);
      color: var(--azul-ceu);
      line-height: 1.6;
    }
    header {
      background: var(--azul-ceu);
      color: var(--areia);
      padding: 4rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    header p { color: var(--gelo); font-size: 1.1rem; }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    section { margin-bottom: 3rem; }
    section h2 {
      color: var(--azul-claro);
      border-bottom: 2px solid var(--gelo);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }
    .contato {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .contato a {
      background: var(--laranja);
      color: var(--areia);
      padding: 0.7rem 1.4rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--azul-claro);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Latitude 29</h1>
    <p>Escola de Voo Livre</p>
  </header>

  <main>
    <section id="sobre">
      <h2>Sobre</h2>
      <p>Conteúdo em construção.</p>
    </section>

    <section id="cursos">
      <h2>Cursos e Voos</h2>
      <p>Conteúdo em construção.</p>
    </section>

    <section id="contato">
      <h2>Contato</h2>
      <div class="contato">
        <a href="#">WhatsApp</a>
        <a href="#">Instagram</a>
      </div>
    </section>
  </main>

  <footer>
    &copy; 2026 Latitude 29
  </footer>
</body>
</html>
